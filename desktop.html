<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDITOR DE CÁMARA - LUGO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <style>
        /* ============ GLASS DESIGN TOKENS ============ */
        :root { /* Light theme (default) */
            color-scheme: light;
            /* legacy vars kept so existing markup + JS inline styles resolve */
            --primary-color:#0ea5e9; --secondary-color:#64748b;
            --background-color:#e8eef7; --surface-color:transparent;
            --input-border-color:rgba(15,23,42,.14); --text-color:#0f172a;
            --text-secondary-color:#516079; --success-color:#0d9488; --danger-color:#e11d48;
            /* glass system */
            --accent:#0ea5e9; --accent-grad:linear-gradient(135deg,#06b6d4,#3b82f6);
            --accent-glow:rgba(56,189,248,.38);
            --glass-bg:rgba(255,255,255,.55); --glass-strong:rgba(255,255,255,.72);
            --glass-brd:rgba(255,255,255,.75); --glass-blur:blur(22px) saturate(155%);
            --glass-sh:0 12px 36px rgba(15,23,42,.13); --glass-inner:inset 0 1px 0 rgba(255,255,255,.85);
            --field-bg:rgba(255,255,255,.5); --field-brd:rgba(15,23,42,.14);
            --page:#e8eef7; --b1:#38bdf8; --b2:#818cf8; --b3:#2dd4bf; --blob-op:.5;
            --radius:20px;
        }
        .dark {
            color-scheme: dark;
            --secondary-color:#8ea0ba;
            --background-color:#0b1120; --surface-color:transparent;
            --input-border-color:rgba(255,255,255,.16); --text-color:#e7eef8;
            --text-secondary-color:#93a4bd; --success-color:#2dd4bf; --danger-color:#fb7185;
            --accent:#38bdf8; --accent-grad:linear-gradient(135deg,#22d3ee,#6366f1);
            --accent-glow:rgba(56,189,248,.42);
            --glass-bg:rgba(255,255,255,.07); --glass-strong:rgba(255,255,255,.12);
            --glass-brd:rgba(255,255,255,.16); --glass-blur:blur(24px) saturate(150%);
            --glass-sh:0 14px 44px rgba(0,0,0,.5); --glass-inner:inset 0 1px 0 rgba(255,255,255,.14);
            --field-bg:rgba(255,255,255,.06); --field-brd:rgba(255,255,255,.16);
            --page:#0b1120; --b1:#0ea5e9; --b2:#6366f1; --b3:#14b8a6; --blob-op:.55;
        }
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family:'Spline Sans',sans-serif; background:var(--page); color:var(--text-color); transition:background-color .3s,color .3s; }

        /* aurora background */
        .aurora { position:fixed; inset:-12%; z-index:-1; overflow:hidden; pointer-events:none; }
        .blob { position:absolute; border-radius:50%; filter:blur(74px); opacity:var(--blob-op); }
        .b1 { width:46vw; height:46vw; background:var(--b1); top:-9vw; left:-6vw; animation:fl1 20s ease-in-out infinite; }
        .b2 { width:42vw; height:42vw; background:var(--b2); bottom:-12vw; right:-6vw; animation:fl2 24s ease-in-out infinite; }
        .b3 { width:32vw; height:32vw; background:var(--b3); top:36%; left:46%; animation:fl3 28s ease-in-out infinite; }
        @keyframes fl1 { 50%{transform:translate(6vw,4vw) scale(1.1);} }
        @keyframes fl2 { 50%{transform:translate(-5vw,-4vw) scale(1.08);} }
        @keyframes fl3 { 50%{transform:translate(-4vw,3vw) scale(1.12);} }

        /* glass surfaces */
        .glass { background:var(--glass-bg); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); border:1px solid var(--glass-brd); border-radius:var(--radius); box-shadow:var(--glass-sh),var(--glass-inner); }
        .topbar { background:var(--glass-strong); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); border-bottom:1px solid var(--glass-brd); box-shadow:0 4px 24px rgba(15,23,42,.06); }
        .panel-label { font-weight:600; font-size:.68rem; letter-spacing:.09em; text-transform:uppercase; color:var(--text-secondary-color); }
        .accent-text { color:var(--accent); }
        .text-soft { color:var(--text-secondary-color); }
        .ic { width:22px; height:22px; fill:none; stroke:currentColor; stroke-width:1.75; stroke-linecap:round; stroke-linejoin:round; }
        .logo-mark { width:38px; height:38px; border-radius:12px; display:grid; place-items:center; background:var(--accent-grad); color:#fff; box-shadow:0 6px 16px var(--accent-glow); flex-shrink:0; }
        .logo-mark .ic { width:22px; height:22px; }
        .panel-head { display:flex; align-items:center; gap:.5rem; font-weight:600; font-size:.68rem; letter-spacing:.09em; text-transform:uppercase; color:var(--text-secondary-color); }
        .panel-head .ic { width:15px; height:15px; color:var(--accent); }
        .status-pill { display:inline-flex; align-items:center; gap:.45rem; font-size:.8rem; font-weight:600; padding:.32rem .8rem; border-radius:999px; background:var(--field-bg); border:1px solid var(--field-brd); }
        .status-pill::before { content:""; width:8px; height:8px; border-radius:50%; background:currentColor; box-shadow:0 0 8px currentColor; }

        /* controls */
        /* selector input/select/textarea.field: sube especificidad para ganar al reset de @tailwindcss/forms
           (background-color:#fff), que si no fuerza fondo blanco y deja el texto claro invisible en modo oscuro */
        .field, input.field, select.field, textarea.field { background:var(--field-bg); border:1px solid var(--field-brd); color:var(--text-color); border-radius:12px; transition:.18s; }
        .field::placeholder { color:var(--text-secondary-color); opacity:.8; }
        .field:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
        select.field option { background:var(--page); color:var(--text-color); }

        .btn-accent { background:var(--accent-grad); color:#fff; border:none; border-radius:12px; font-weight:700; box-shadow:0 6px 18px var(--accent-glow); transition:.18s; }
        .btn-accent:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 10px 26px var(--accent-glow); }
        .btn-accent:active:not(:disabled) { transform:translateY(0); }
        .btn-accent:disabled { opacity:.5; box-shadow:none; filter:grayscale(.35); cursor:not-allowed; }

        .btn-soft { background:var(--glass-strong); color:var(--text-color); border:1px solid var(--glass-brd); border-radius:12px; font-weight:600; -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); transition:.18s; }
        .btn-soft:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
        .btn-soft:disabled { opacity:.5; cursor:not-allowed; }

        .icon-btn { width:42px; height:42px; border-radius:50%; display:grid; place-items:center; background:var(--glass-bg); border:1px solid var(--glass-brd); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); color:var(--text-color); transition:.18s; }
        .icon-btn:hover { color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }

        .tool-btn { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.35rem; padding:.7rem .4rem; background:var(--glass-bg); border:1px solid var(--glass-brd); border-radius:14px; color:var(--text-secondary-color); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); transition:.18s; }
        .tool-btn span { font-size:.66rem; font-weight:600; }
        .tool-btn .ic { width:22px; height:22px; }
        .tool-btn:hover:not(:disabled) { color:var(--accent); border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
        .tool-btn:disabled { opacity:.4; cursor:not-allowed; }
        .tool-btn.active { background:var(--accent-grad) !important; color:#fff !important; border-color:transparent; box-shadow:0 6px 16px var(--accent-glow); }

        .logo-drop { border:1.5px dashed var(--field-brd); border-radius:12px; background:var(--field-bg); transition:.18s; }
        .logo-drop:hover { border-color:var(--accent); }

        .swatch { border:2px solid var(--glass-brd); box-shadow:0 2px 6px rgba(15,23,42,.15); }
        input[name="color"].swatch:checked { box-shadow:0 0 0 3px var(--page),0 0 0 5px var(--accent); }

        input[type=range] { -webkit-appearance:none; appearance:none; height:6px; border-radius:999px; background:var(--field-bg); border:1px solid var(--field-brd); }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(--accent-grad); box-shadow:0 2px 8px var(--accent-glow); cursor:pointer; border:2px solid rgba(255,255,255,.85); }
        input[type=range]::-moz-range-thumb { width:16px; height:16px; border:none; border-radius:50%; background:var(--accent); cursor:pointer; }
        input[type=range]:disabled { opacity:.45; }

        .toggle { position:relative; border:1px solid var(--field-brd); background:var(--field-bg); transition:.2s; }
        .toggle:checked { background:var(--accent-grad); border-color:transparent; }
        .toggle::before { content:""; position:absolute; top:1px; left:1px; width:18px; height:18px; border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.35); transition:.2s; }
        .toggle:checked::before { transform:translateX(20px); }

        .stage { background:radial-gradient(circle at 50% 38%, var(--glass-bg), transparent 72%); }
        #canvas { border-radius:14px; box-shadow:0 26px 64px rgba(0,0,0,.3); background:#fff; }
        #qrCanvas { border-radius:12px; }

        .spinner { border:3px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; width:1.2em; height:1.2em; animation:spin 1s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .cropping #canvas { cursor:crosshair; }
        .logo-preview { max-width:80px; max-height:30px; object-fit:contain; }

        .toast-notification { position:fixed; bottom:-100px; left:50%; transform:translateX(-50%); z-index:5001; -webkit-backdrop-filter:blur(16px); backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,.18); box-shadow:0 12px 40px rgba(0,0,0,.35); transition:all .5s cubic-bezier(0.175,0.885,0.32,1.275); }
        .toast-notification.show { bottom:24px; }
        aside::-webkit-scrollbar { width:8px; }
        aside::-webkit-scrollbar-thumb { background:var(--glass-brd); border-radius:99px; }

        /* ===== WOW: galería en vivo + aviso + PDF ===== */
        .stage { position:relative; }
        .stage:has(#filmstrip .thumb) { padding-bottom:88px; }
        .filmstrip { position:absolute; left:0; right:0; bottom:0; display:flex; gap:.5rem; padding:.6rem .8rem; overflow-x:auto; background:var(--glass-strong); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); border-top:1px solid var(--glass-brd); z-index:5; }
        .filmstrip:empty { display:none; }
        .thumb { position:relative; height:64px; width:64px; flex-shrink:0; border-radius:10px; overflow:hidden; cursor:pointer; border:2px solid transparent; box-shadow:0 4px 12px rgba(0,0,0,.25); transition:transform .15s; }
        .thumb img { width:100%; height:100%; object-fit:cover; display:block; }
        .thumb:hover { transform:translateY(-2px); }
        .thumb.active { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
        .thumb .badge { position:absolute; top:1px; left:4px; font-size:.6rem; font-weight:700; color:#fff; text-shadow:0 1px 2px #000; }
        @keyframes thumbIn { from{ transform:scale(.6); opacity:0; } to{ transform:scale(1); opacity:1; } }
        .thumb.new { animation:thumbIn .35s cubic-bezier(0.175,0.885,0.32,1.275); }
        @keyframes rxpulse { 0%{ box-shadow:0 26px 64px rgba(0,0,0,.3),0 0 0 0 var(--accent-glow); } 30%{ box-shadow:0 26px 64px rgba(0,0,0,.3),0 0 0 12px var(--accent-glow); } 100%{ box-shadow:0 26px 64px rgba(0,0,0,.3),0 0 0 0 rgba(0,0,0,0); } }
        #canvas.rx { animation:rxpulse .75s ease-out; }
        .btn-pdf { display:inline-flex; align-items:center; gap:.35rem; font-size:.72rem; font-weight:600; padding:.3rem .75rem; border-radius:999px; background:var(--field-bg); border:1px solid var(--field-brd); color:var(--text-secondary-color); cursor:pointer; transition:.18s; }
        .btn-pdf:hover:not(:disabled) { color:var(--accent); border-color:var(--accent); }
        .btn-pdf:disabled { opacity:.4; cursor:not-allowed; }
    </style>
</head>
<body class="min-h-screen">
    <div class="aurora" aria-hidden="true"><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span></div>
    <div class="flex flex-col h-screen">
        <header class="topbar flex items-center justify-between px-6 py-4 flex-shrink-0">
             <div class="flex items-center gap-3">
                <span class="logo-mark"><svg class="ic" viewBox="0 0 24 24"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3Z"/><circle cx="12" cy="13" r="3.5"/></svg></span>
                <h1 class="text-lg font-bold tracking-tight">
                    <span class="accent-text">EDITOR DE CÁMARA</span>
                    <span class="text-soft">LUGO</span>
                </h1>
            </div>
            <div class="flex items-center gap-2">
                <button id="muteBtn" class="icon-btn" title="Silenciar aviso de nueva imagen"></button>
                <button id="themeToggle" class="icon-btn" title="Cambiar tema"></button>
            </div>
        </header>

        <main class="flex flex-1 overflow-hidden">
            <aside class="w-96 p-5 overflow-y-auto flex-shrink-0">
                <div class="space-y-4">
                    <div class="glass p-5">
                        <div class="panel-head mb-3"><svg class="ic" viewBox="0 0 24 24"><path d="M9 17H7A5 5 0 0 1 7 7h2"/><path d="M15 7h2a5 5 0 0 1 0 10h-2"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Conexión</div>
                        <div class="flex items-center gap-2"><input type="number" id="channelId" placeholder="Código de 4 dígitos" class="field w-full focus:outline-none h-11 px-3"><button id="connectBtn" class="btn-accent relative flex-shrink-0 h-11 px-5">Conectar</button></div>
                        <div id="qrContainer" class="mt-4 text-center hidden"><canvas id="qrCanvas"></canvas><p class="text-xs text-soft mt-2">Escanea este código desde el móvil</p></div>
                        <div class="text-center mt-3"><span id="status" class="status-pill">Desconectado</span></div>
                    </div>

                    <div class="glass p-5">
                        <div class="panel-head mb-3"><svg class="ic" viewBox="0 0 24 24"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="2" y1="14" x2="6" y2="14"/><line x1="10" y1="8" x2="14" y2="8"/><line x1="18" y1="16" x2="22" y2="16"/></svg>Herramientas</div>
                          <div class="grid grid-cols-3 gap-2">
                            <button id="undoBtn" title="Deshacer" class="tool-btn" disabled><svg class="ic" viewBox="0 0 24 24"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H10"/></svg><span>Deshacer</span></button>
                            <button id="rotateBtn" title="Rotar" class="tool-btn" disabled><svg class="ic" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v5h-5"/></svg><span>Rotar</span></button>
                            <button id="cropBtn" title="Recortar" class="tool-btn" disabled><svg class="ic" viewBox="0 0 24 24"><path d="M6 2v14a2 2 0 0 0 2 2h14"/><path d="M18 22V8a2 2 0 0 0-2-2H2"/></svg><span>Recortar</span></button>
                            <button id="drawModeBtn" title="Dibujar" class="tool-btn" disabled><svg class="ic" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg><span>Dibujar</span></button>
                            <button id="collageBtn" title="Fusionar Imagen (Collage)" class="tool-btn" disabled><svg class="ic" viewBox="0 0 24 24"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg><span>Fusionar</span></button>
                            <button id="resetImageBtn" title="Restaurar Imagen Original" class="tool-btn" disabled><svg class="ic" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l3 2"/></svg><span>Restaurar</span></button>
                          </div>
                          <input type="file" id="collageInput" class="hidden" accept="image/png, image/jpeg">
                    </div>

                    <div class="glass p-5">
                        <div class="panel-head mb-3"><svg class="ic" viewBox="0 0 24 24"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>Nº de Registro</div>
                        <div class="flex items-center gap-2">
                             <input type="text" id="prefixInput" value="24-" class="field w-16 text-center focus:outline-none h-11 px-2" disabled>
                             <input type="text" id="requestNumberInput" placeholder="00001" class="field flex-grow w-full min-w-0 focus:outline-none h-11 px-3" disabled>
                             <button id="incrementBtn" title="Incrementar número" class="btn-soft flex-shrink-0 flex items-center justify-center h-11 w-11 text-lg" disabled>+</button>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mt-3">
                             <div><label for="fontSizeInput" class="text-xs panel-label">Tamaño</label><input type="range" id="fontSizeInput" min="12" max="500" value="150" class="w-full mt-2" disabled></div>
                             <div><label class="text-xs panel-label block">Color</label><div class="flex gap-2 mt-2"><input type="radio" name="color" data-color="white" class="swatch appearance-none w-6 h-6 bg-white rounded-full cursor-pointer" disabled><input type="radio" name="color" data-color="black" class="swatch appearance-none w-6 h-6 bg-black rounded-full cursor-pointer" disabled><input type="radio" name="color" data-color="#E4002B" class="swatch appearance-none w-6 h-6 bg-[#E4002B] rounded-full cursor-pointer" disabled></div></div>
                        </div>
                        <div class="mt-3"><label for="positionSelect" class="text-xs panel-label">Posición</label><select id="positionSelect" class="field w-full mt-2 focus:outline-none h-11 px-3" disabled></select></div>
                    </div>

                    <div class="glass p-5">
                        <div class="panel-head mb-3"><svg class="ic" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.5-3.5L9 20"/></svg>Branding</div>
                        <div class="grid grid-cols-3 gap-2 mb-2">
                            <label for="logoUpload1" class="logo-drop relative h-12 flex items-center justify-center cursor-pointer"><img id="logo-preview-1" class="logo-preview hidden"><span id="logo-text-1" class="text-xs text-soft">Logo 1</span></label>
                            <label for="logoUpload2" class="logo-drop relative h-12 flex items-center justify-center cursor-pointer"><img id="logo-preview-2" class="logo-preview hidden"><span id="logo-text-2" class="text-xs text-soft">Logo 2</span></label>
                            <label for="logoUpload3" class="logo-drop relative h-12 flex items-center justify-center cursor-pointer"><img id="logo-preview-3" class="logo-preview hidden"><span id="logo-text-3" class="text-xs text-soft">Logo 3</span></label>
                        </div>
                        <input type="file" id="logoUpload1" class="hidden" accept="image/png, image/jpeg" data-slot="1">
                        <input type="file" id="logoUpload2" class="hidden" accept="image/png, image/jpeg" data-slot="2">
                        <input type="file" id="logoUpload3" class="hidden" accept="image/png, image/jpeg" data-slot="3">
                        <div class="flex items-center mt-2">
                            <select id="logoSelect" class="field flex-grow w-full focus:outline-none h-11 px-3 text-sm" disabled><option value="none">No usar logo</option></select>
                        </div>
                    </div>

                    <div class="glass p-5 space-y-3">
                         <div class="panel-head mb-2"><svg class="ic" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Acciones</div>
                         <div class="flex items-center justify-between px-3 py-2.5 rounded-xl" style="background:var(--field-bg);border:1px solid var(--field-brd);">
                            <label for="batchModeToggle" class="text-sm font-medium">Modo Ráfaga (Auto-Descarga)</label>
                            <input type="checkbox" id="batchModeToggle" class="toggle h-5 w-10 rounded-full appearance-none cursor-pointer" disabled>
                         </div>
                         <button id="downloadPngBtn" class="btn-accent w-full h-11 text-sm" disabled>Descargar PNG (Alta Calidad)</button>
                         <div class="flex items-center gap-2">
                             <button id="downloadJpgBtn" class="btn-soft flex-grow w-full h-11 text-sm" disabled>Descargar JPG</button>
                             <input type="range" id="jpgQuality" min="0.1" max="1" value="0.8" step="0.1" class="w-24" title="Calidad JPG" disabled>
                         </div>
                         <div class="flex justify-end"><button id="downloadPdfBtn" class="btn-pdf" disabled title="Descargar como PDF (imagen + nº de registro + fecha)"><svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/></svg>PDF</button></div>
                    </div>
                </div>
            </aside>
            <main class="stage flex-1 flex items-center justify-center p-6">

function applyTheme(theme) { document.documentElement.classList.toggle('dark', theme === 'dark'); themeToggle.innerHTML = theme === 'dark' ? sunIcon : moonIcon; }
themeToggle.addEventListener('click', () => { const newTheme = document.documentElement.classList.contains('dark') ? 'light' : 'dark'; localStorage.setItem('theme', newTheme); applyTheme(newTheme); });
function showToast(message, type = 'info', duration = 3000) { const toast = get('toast'), toastMessage = get('toast-message'); clearTimeout(toastTimeout); toastMessage.textContent = message; toast.className = 'toast-notification bg-gray-800 text-white py-3 px-6 rounded-full shadow-lg show'; toast.classList.remove('bg-green-600', 'bg-red-600'); if (type === 'success') toast.classList.add('bg-green-600'); if (type === 'error') toast.classList.add('bg-red-600'); toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, duration); }
function setButtonLoading(button, isLoading, originalText) { if(!button) return; button.disabled = isLoading; if(isLoading) { button.innerHTML = `<div class="spinner mx-auto"></div>`; } else { button.innerHTML = originalText; } }
function saveSettings() { const settings = { fontSize: fontSizeInput.value, color: document.querySelector('input[name="color"]:checked').dataset.color, position: positionSelect.value, prefix: prefixInput.value, number: requestNumberInput.value }; localStorage.setItem('desktopPrefs', JSON.stringify(settings)); }
function loadSettings() {
    const prefs = JSON.parse(localStorage.getItem('desktopPrefs'));
    if (prefs) {
        fontSizeInput.value = prefs.fontSize || 150; positionSelect.value = prefs.position || 'bottom-right';
        const colorInput = document.querySelector(`input[name="color"][data-color="${prefs.color || 'white'}"]`);

function enableAllControls(enabled) {
    [prefixInput, requestNumberInput, incrementBtn, fontSizeInput, positionSelect, downloadPngBtn, downloadJpgBtn, jpgQuality, cropBtn, rotateBtn, drawModeBtn, collageBtn, resetImageBtn, logoSelect, batchModeToggle, ...document.querySelectorAll('.image-filter'), ...document.querySelectorAll('input[name="color"]')].forEach(el => el.disabled = !enabled);

}
function saveState() { history.push(canvas.toDataURL()); if (history.length > 10) history.shift(); undoBtn.disabled = false; }
function undo() {

function connectToChannel() {

    setButtonLoading(connectBtn, true, 'Conectar');
    currentChannelRef = database.ref('channels/' + channelId);
    const initialData = { imageData: "placeholder", textData: "", timestamp: firebase.database.ServerValue.TIMESTAMP };
    currentChannelRef.set(initialData).then(() => {
        currentChannelRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.timestamp > lastReceivedTimestamp && data.imageData !== "placeholder") { lastReceivedTimestamp = data.timestamp; processNewImage(data.imageData); }
        });

function setUIState(isConnected) {

    statusDiv.textContent = isConnected ? `Conectado: Sala ${channelIdInput.value}` : 'Desconectado';
    statusDiv.style.color = isConnected ? 'var(--success-color)' : 'var(--danger-color)';

function renderCanvas() {
    if (!currentImage) return;
    const img = new Image();
    img.onload = () => {
        canvas.width = img.width; canvas.height = img.height;
        const filters = Array.from(document.querySelectorAll('.image-filter')).map(f => `${f.dataset.filter}(${f.value})`).join(' ');
        ctx.filter = filters;
        ctx.drawImage(img, 0, 0);
        ctx.filter = 'none';

        const fullRequestText = `${prefixInput.value}${requestNumberInput.value}`;
        const fontSize = parseInt(fontSizeInput.value, 10);
        const position = positionSelect.value;
        const selectedColor = document.querySelector('input[name="color"]:checked').dataset.color;
        const padding = Math.max(20, fontSize / 2);
        if (fullRequestText.length > prefixInput.value.length) {
            ctx.font = `bold ${fontSize}px Arial`; ctx.fillStyle = selectedColor;
            ctx.strokeStyle = (selectedColor === 'white' || selectedColor === '#E4002B') ? 'black' : 'white';
            ctx.lineWidth = Math.max(2, fontSize / 12);
            const textMetrics = ctx.measureText(fullRequestText);
            let x, y;
            if (position === 'top-left') { x = padding; y = fontSize + padding; }
            else if (position === 'top-right') { x = canvas.width - textMetrics.width - padding; y = fontSize + padding; }
            else if (position === 'bottom-left') { x = padding; y = canvas.height - padding; }
            else { x = canvas.width - textMetrics.width - padding; y = canvas.height - padding; }
            ctx.strokeText(fullRequestText, x, y); ctx.fillText(fullRequestText, x, y);
        }

        const selectedLogoIndex = parseInt(logoSelect.value, 10);
        if (!isNaN(selectedLogoIndex) && companyLogos[selectedLogoIndex] && companyLogos[selectedLogoIndex].src) {
            const logo = companyLogos[selectedLogoIndex];
            const logoHeight = fontSize;
            const logoWidth = (logo.width / logo.height) * logoHeight;
            let x, y;
            if (position === 'bottom-right') { x = padding; y = padding; }
            else if (position === 'bottom-left') { x = canvas.width - logoWidth - padding; y = padding; }
            else if (position === 'top-right') { x = padding; y = canvas.height - logoHeight - padding; }
            else { x = canvas.width - logoWidth - padding; y = canvas.height - logoHeight - padding; }
            ctx.drawImage(logo, x, y, logoWidth, logoHeight);
        }
    };
    img.src = currentImage;
}
function processNewImage(imageData) {
    originalImage = imageData; currentImage = imageData;
    history = [originalImage];
    placeholderText.style.display = 'none'; canvas.style.display = 'block';
    document.querySelectorAll('.image-filter').forEach(f => f.value = 1);
    enableAllControls(true);
    renderCanvas();
    if(batchModeToggle.checked) {
        setTimeout(() => {
            downloadPngBtn.click();
            incrementBtn.click();
        }, 500);
    }
}
function resetImage() { currentImage = originalImage; isDrawing = false; isCropping = false; drawModeBtn.classList.remove('active'); cropBtn.classList.remove('active'); canvas.style.cursor = 'default'; saveState(); renderCanvas(); }
function rotateImage() { if (!currentImage) return; saveState(); const img = new Image(); img.onload = () => { const tempCanvas = document.createElement('canvas'); const tempCtx = tempCanvas.getContext('2d'); tempCanvas.width = img.height; tempCanvas.height = img.width; tempCtx.translate(tempCanvas.width / 2, tempCanvas.height / 2); tempCtx.rotate(90 * Math.PI / 180); tempCtx.drawImage(img, -img.width / 2, -img.height / 2); currentImage = tempCanvas.toDataURL('image/jpeg', 0.95); renderCanvas(); }; img.src = currentImage; }
function setupDrawingAndCropping() {
    let lastX = 0, lastY = 0, isDown = false;
    const getPos = (e) => { const rect = canvas.getBoundingClientRect(); return [(e.clientX - rect.left) * (canvas.width / rect.width), (e.clientY - rect.top) * (canvas.height / rect.height)]; }
    const start = (e) => { if (!isDrawing && !isCropping) return; e.preventDefault(); isDown = true; saveState(); [lastX, lastY] = getPos(e); if (isCropping) { cropStartX = lastX; cropStartY = lastY; } };
    const draw = (e) => {
        if (!isDown) return; e.preventDefault();
        const [x, y] = getPos(e);
        if (isDrawing) { ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.strokeStyle = document.querySelector('input[name="color"]:checked').dataset.color; ctx.lineWidth = 5 * (canvas.width / 800); ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke(); }
        if (isCropping) { renderCanvas(); ctx.fillStyle = 'rgba(0, 120, 255, 0.3)'; ctx.fillRect(cropStartX, cropStartY, x - cropStartX, y - cropStartY); }
        [lastX, lastY] = [x, y];
    };
    const stop = (e) => { if (isDown) { if (isDrawing) { currentImage = canvas.toDataURL('image/jpeg', 0.95); } if (isCropping) { cropEndX = lastX; cropEndY = lastY; applyCrop(); } } isDown = false; };
    ['mousedown'].forEach(evt => canvas.addEventListener(evt, start));
    ['mousemove'].forEach(evt => canvas.addEventListener(evt, draw));
    ['mouseup', 'mouseleave'].forEach(evt => canvas.addEventListener(evt, stop));
}
function applyCrop() {
    const x = Math.min(cropStartX, cropEndX); const y = Math.min(cropStartY, cropEndY);
    const width = Math.abs(cropEndX - cropStartX); const height = Math.abs(cropEndY - cropStartY);
    if (width < 20 || height < 20) { renderCanvas(); return; }
    const tempCanvas = document.createElement('canvas'); tempCanvas.width = width; tempCanvas.height = height;
    const tempCtx = tempCanvas.getContext('2d');
    const img = new Image();
    img.onload = () => { tempCtx.drawImage(img, x, y, width, height, 0, 0, width, height); currentImage = tempCanvas.toDataURL('image/jpeg'); renderCanvas(); };
    img.src = canvas.toDataURL();
}

// --- FUNCIONALIDAD COLLAGE ---
function triggerCollageUpload() { collageInput.click(); }
collageInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => { createCollage(event.target.result); collageInput.value = ''; };
    reader.readAsDataURL(file);
});
function createCollage(secondImageSrc) {
    if (!currentImage) return;
    setButtonLoading(collageBtn, true, '');
    const img1 = new Image();
    const img2 = new Image();
    let imagesLoaded = 0;
    const onImageLoad = () => { imagesLoaded++; if (imagesLoaded === 2) performMerge(img1, img2); };
    img1.onload = onImageLoad; img2.onload = onImageLoad;
    img1.src = currentImage; img2.src = secondImageSrc;
}
function performMerge(img1, img2) {
    saveState();
    const scaleFactor = img1.height / img2.height;
    const newWidth2 = img2.width * scaleFactor;
    const tempCanvas = document.createElement('canvas');
    const gap = 20;
    tempCanvas.height = img1.height;
    tempCanvas.width = img1.width + gap + newWidth2;
    const tCtx = tempCanvas.getContext('2d');
    tCtx.fillStyle = "#FFFFFF";
    tCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
    tCtx.drawImage(img1, 0, 0);
    tCtx.drawImage(img2, img1.width + gap, 0, newWidth2, img1.height);
    currentImage = tempCanvas.toDataURL('image/jpeg', 0.95);
    renderCanvas();
    setButtonLoading(collageBtn, false, originalIconCollage);
    showToast('Collage creado con éxito', 'success');
}

function downloadImage(format = 'png', quality = 1.0) {
    renderCanvas();
    setTimeout(() => {
        const link = document.createElement('a');
        const requestNum = `${prefixInput.value}${requestNumberInput.value}`;
        link.download = `${requestNum}.${format}`;
        link.href = canvas.toDataURL(`image/${format}`, quality);
        link.click();

        // ========== REGISTRO AUTOMÁTICO EN FIREBASE ==========
        const today = new Date().toISOString().split('T')[0];
        const hora = new Date().toLocaleTimeString('es-ES');
        const nuevoRegistro = requestNum + ' (' + hora + ')';

        database.ref('descargas/' + today + '/total').transaction(function(total) {
            return (total || 0) + 1;
        });

        database.ref('descargas/' + today + '/lista').transaction(function(listaActual) {
            if (listaActual) {
                return listaActual + '\n' + nuevoRegistro;
            } else {
                return nuevoRegistro;
            }
        }).catch(function(error) {
            console.log('Error al registrar:', error);
        });
        // =====================================================

    }, 100);
}
[...document.querySelectorAll('input[type="file"][data-slot]')].forEach(input => {
    input.addEventListener('change', e => {
        const slot = parseInt(e.target.dataset.slot, 10);
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const logoDataUrl = event.target.result;
                localStorage.setItem(`companyLogo${slot}`, logoDataUrl);
                companyLogos[slot - 1].src = logoDataUrl;
                get(`logo-preview-${slot}`).src = logoDataUrl;
                get(`logo-preview-${slot}`).classList.remove('hidden');
                get(`logo-text-${slot}`).classList.add('hidden');
                updateLogoSelector();
                renderCanvas();
            };
            reader.readAsDataURL(file);
        }
    });
});
function updateLogoSelector() {
    const currentSelection = logoSelect.value;
    logoSelect.innerHTML = '<option value="none">No usar logo</option>';
    companyLogos.forEach((logo, index) => {
        if (logo.src) {

            option.textContent = `Logo ${index + 1}`;

        }

}

/* ===== FUNCIONES WOW: galería en vivo + aviso (sonido/pulso) + export PDF ===== */
(function(){
    let audioCtx = null, muted = localStorage.getItem('rxMuted') === '1';
    const muteBtn = get('muteBtn');
    const icOn = `<svg class="ic" viewBox="0 0 24 24"><path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg>`;
    const icOff = `<svg class="ic" viewBox="0 0 24 24"><path d="M11 5 6 9H2v6h4l5 4V5Z"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></svg>`;
    function paintMute(){ if(muteBtn) muteBtn.innerHTML = muted ? icOff : icOn; }
    function initAudio(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){} } }
    function chime(){ if(muted || !audioCtx) return; try{
        const t = audioCtx.currentTime, o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.setValueAtTime(784, t); o.frequency.setValueAtTime(1175, t + 0.09);
        g.gain.setValueAtTime(0.0001, t); g.gain.exponentialRampToValueAtTime(0.22, t + 0.02); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.34);
        o.connect(g).connect(audioCtx.destination); o.start(t); o.stop(t + 0.35);
    }catch(e){} }
    function pulse(){ const c = get('canvas'); if(!c) return; c.classList.remove('rx'); void c.offsetWidth; c.classList.add('rx'); setTimeout(() => c.classList.remove('rx'), 800); }
    if(muteBtn){ paintMute(); muteBtn.addEventListener('click', () => { muted = !muted; localStorage.setItem('rxMuted', muted ? '1' : '0'); paintMute(); if(!muted) initAudio(); }); }
    connectBtn.addEventListener('click', initAudio);

    const strip = get('filmstrip'); let shots = 0;
    function clearActive(){ if(strip) strip.querySelectorAll('.thumb.active').forEach(el => el.classList.remove('active')); }
    function setActive(src){ originalImage = src; currentImage = src; history = [src]; enableAllControls(true); undoBtn.disabled = true; placeholderText.style.display = 'none'; canvas.style.display = 'block'; renderCanvas(); }
    function galleryAdd(src){
        if(!strip) return; shots++;
        const t = document.createElement('div'); t.className = 'thumb new';
        t.innerHTML = '<img src="' + src + '"><span class="badge">' + shots + '</span>';
        t.addEventListener('click', () => { clearActive(); t.classList.add('active'); setActive(src); });
        clearActive(); strip.appendChild(t); t.classList.add('active');
        strip.scrollLeft = strip.scrollWidth;
        while(strip.children.length > 40) strip.removeChild(strip.firstChild);
    }

    const _origProcess = processNewImage;
    processNewImage = function(imageData){ _origProcess(imageData); galleryAdd(imageData); chime(); pulse(); };

    const _origEnable = enableAllControls;
    enableAllControls = function(enabled){ _origEnable(enabled); const p = get('downloadPdfBtn'); if(p) p.disabled = !enabled; };
    const _pdf0 = get('downloadPdfBtn'); if(_pdf0) _pdf0.disabled = true;

    const pdfBtn = get('downloadPdfBtn');
    if(pdfBtn) pdfBtn.addEventListener('click', () => {
        if(!currentImage) return;
        renderCanvas();
        setTimeout(() => {
            try{
                const requestNum = prefixInput.value + requestNumberInput.value;
                const imgData = canvas.toDataURL('image/jpeg', 0.92);
                const JsPDF = (window.jspdf && window.jspdf.jsPDF) ? window.jspdf.jsPDF : window.jsPDF;
                const landscape = canvas.width >= canvas.height;
                const pdf = new JsPDF({ orientation: landscape ? 'l' : 'p', unit: 'pt', format: 'a4' });
                const pw = pdf.internal.pageSize.getWidth(), ph = pdf.internal.pageSize.getHeight();
                const margin = 36, footerH = 46;
                const rr = Math.min((pw - margin * 2) / canvas.width, (ph - margin * 2 - footerH) / canvas.height);
                const w = canvas.width * rr, h = canvas.height * rr;
                pdf.addImage(imgData, 'JPEG', (pw - w) / 2, margin, w, h);
                const now = new Date();
                const stamp = 'Nº de registro: ' + requestNum + '     ·     ' + now.toLocaleDateString('es-ES') + ' ' + now.toLocaleTimeString('es-ES');
                pdf.setFontSize(12); pdf.setTextColor(30, 30, 30);
                pdf.text(stamp, pw / 2, ph - margin, { align: 'center' });
                pdf.save(requestNum + '.pdf');
                showToast('PDF generado', 'success');
                const today = new Date().toISOString().split('T')[0];
                const hora = new Date().toLocaleTimeString('es-ES');
                const nuevoRegistro = requestNum + ' (' + hora + ', PDF)';
                database.ref('descargas/' + today + '/total').transaction(function(total){ return (total || 0) + 1; });
                database.ref('descargas/' + today + '/lista').transaction(function(listaActual){ return listaActual ? (listaActual + '\n' + nuevoRegistro) : nuevoRegistro; }).catch(function(err){ console.log('Error al registrar:', err); });
            }catch(e){ showToast('Error al generar PDF: ' + e.message, 'error'); }
        }, 120);
    });
})();
</script>
</body>
