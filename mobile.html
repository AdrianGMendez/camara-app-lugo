<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CÁMARA REMOTA LUGO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b1120">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        /* ============ GLASS DESIGN TOKENS — mobile (dark default) ============ */
        :root { /* Dark theme (default) */
            color-scheme: dark;
            --primary-color:#38bdf8; --secondary-color:#8ea0ba;
            --background-color:#0b1120; --surface-color:transparent;
            --input-border-color:rgba(255,255,255,.16); --text-color:#e7eef8;
            --accent:#38bdf8; --accent-grad:linear-gradient(135deg,#22d3ee,#6366f1);
            --accent-glow:rgba(56,189,248,.42);
            --glass-bg:rgba(255,255,255,.07); --glass-strong:rgba(255,255,255,.12);
            --glass-brd:rgba(255,255,255,.16); --glass-blur:blur(22px) saturate(150%);
            --glass-sh:0 14px 44px rgba(0,0,0,.5); --glass-inner:inset 0 1px 0 rgba(255,255,255,.14);
            --field-bg:rgba(255,255,255,.06); --field-brd:rgba(255,255,255,.18);
            --text-secondary-color:#93a4bd;
            --page:#0b1120; --b1:#0ea5e9; --b2:#6366f1; --b3:#14b8a6; --blob-op:.55;
            --radius:22px;
        }
        .light {
            color-scheme: light;
            --secondary-color:#516079;
            --background-color:#e8eef7; --surface-color:transparent;
            --input-border-color:rgba(15,23,42,.14); --text-color:#0f172a;
            --accent:#0ea5e9; --accent-grad:linear-gradient(135deg,#06b6d4,#3b82f6);
            --accent-glow:rgba(56,189,248,.38);
            --glass-bg:rgba(255,255,255,.55); --glass-strong:rgba(255,255,255,.72);
            --glass-brd:rgba(255,255,255,.75); --glass-blur:blur(22px) saturate(155%);
            --glass-sh:0 12px 36px rgba(15,23,42,.13); --glass-inner:inset 0 1px 0 rgba(255,255,255,.85);
            --field-bg:rgba(255,255,255,.5); --field-brd:rgba(15,23,42,.14);
            --text-secondary-color:#516079;
            --page:#e8eef7; --b1:#38bdf8; --b2:#818cf8; --b3:#2dd4bf; --blob-op:.5;
        }
        body { font-family:'Spline Sans',sans-serif; background:var(--page); color:var(--text-color); -webkit-tap-highlight-color:transparent; transition:background-color .3s,color .3s; }

        .aurora { position:fixed; inset:-12%; z-index:-1; overflow:hidden; pointer-events:none; }
        .blob { position:absolute; border-radius:50%; filter:blur(66px); opacity:var(--blob-op); }
        .b1 { width:80vw; height:80vw; background:var(--b1); top:-18vw; left:-24vw; animation:fl1 20s ease-in-out infinite; }
        .b2 { width:70vw; height:70vw; background:var(--b2); bottom:-20vw; right:-24vw; animation:fl2 24s ease-in-out infinite; }
        .b3 { width:56vw; height:56vw; background:var(--b3); top:40%; left:30%; animation:fl3 28s ease-in-out infinite; }
        @keyframes fl1 { 50%{transform:translate(8vw,6vw) scale(1.1);} }
        @keyframes fl2 { 50%{transform:translate(-7vw,-6vw) scale(1.08);} }
        @keyframes fl3 { 50%{transform:translate(-6vw,4vw) scale(1.12);} }

        .glass { background:var(--glass-bg); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); border:1px solid var(--glass-brd); border-radius:var(--radius); box-shadow:var(--glass-sh),var(--glass-inner); }
        .accent-text { color:var(--accent); }
        .text-soft { color:var(--text-secondary-color); }
        .ic { width:22px; height:22px; fill:none; stroke:currentColor; stroke-width:1.75; stroke-linecap:round; stroke-linejoin:round; }
        .logo-mark { width:42px; height:42px; border-radius:13px; display:grid; place-items:center; background:var(--accent-grad); color:#fff; box-shadow:0 6px 16px var(--accent-glow); flex-shrink:0; }

        /* selector input/select/textarea.field: sube especificidad para ganar al reset de @tailwindcss/forms
           (background-color:#fff), que si no fuerza fondo blanco y deja el texto claro invisible en modo oscuro */
        .field, input.field, select.field, textarea.field { background:var(--field-bg); border:1px solid var(--field-brd); color:var(--text-color); border-radius:14px; transition:.18s; }
        .field::placeholder { color:var(--text-secondary-color); opacity:.85; }
        .field:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }

        .btn-accent { background:var(--accent-grad); color:#fff; border:none; border-radius:14px; font-weight:700; box-shadow:0 6px 18px var(--accent-glow); transition:.18s; }
        .btn-accent:active:not(:disabled) { transform:scale(.98); }
        .btn-accent:disabled { opacity:.55; box-shadow:none; }

        .btn-soft { background:var(--glass-strong); color:var(--text-color); border:1px solid var(--glass-brd); border-radius:14px; font-weight:600; -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); transition:.18s; }
        .btn-soft:active { transform:scale(.98); }

        .icon-btn { width:44px; height:44px; border-radius:50%; display:grid; place-items:center; background:var(--glass-bg); border:1px solid var(--glass-brd); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); color:var(--text-color); transition:.18s; flex-shrink:0; }
        .icon-btn:active { transform:scale(.94); }

        .capture-drop { background:var(--glass-bg); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); border:2px dashed var(--glass-brd); border-radius:var(--radius); color:var(--text-secondary-color); transition:.18s; }
        .capture-drop:active { border-color:var(--accent); color:var(--accent); }
        #preview { border:1px solid var(--glass-brd); box-shadow:var(--glass-sh); }

        .spinner { border:3px solid rgba(255,255,255,.35); border-top-color:#fff; border-radius:50%; width:1.2em; height:1.2em; animation:spin 1s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        #qrScannerContainer { background:rgba(6,10,20,.72); -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px); }
        .toast-notification { position:fixed; bottom:-100px; left:50%; transform:translateX(-50%); z-index:5001; -webkit-backdrop-filter:blur(16px); backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,.18); box-shadow:0 12px 40px rgba(0,0,0,.4); transition:all .5s cubic-bezier(0.175,0.885,0.32,1.275); }
        .toast-notification.show { bottom:24px; }
        #ack-overlay { transition:opacity .5s; -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); }
    </style>
</head>
<body class="min-h-screen">
    <div class="aurora" aria-hidden="true"><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span></div>
    <div class="flex flex-col h-screen p-4 space-y-4">
        <header class="flex items-center justify-between gap-3">
            <span class="logo-mark"><svg class="ic" viewBox="0 0 24 24"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3Z"/><circle cx="12" cy="13" r="3.5"/></svg></span>
            <h1 class="text-xl font-bold tracking-tight text-center flex-grow"><span class="accent-text">CÁMARA</span> REMOTA LUGO</h1>
            <button id="themeToggle" class="icon-btn focus:outline-none"></button>
        </header>

        <div class="glass p-4">
            <div class="grid grid-cols-[1fr_auto_auto] gap-2">
                <input type="number" id="channelId" placeholder="Código de 4 dígitos" class="field w-full h-12 px-3">
                <button id="qrScanBtn" class="btn-soft h-12 w-14 flex items-center justify-center"><svg class="ic" viewBox="0 0 24 24"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg></button>
                <button id="connectBtn" class="btn-accent relative h-12 px-5">Conectar</button>
            </div>
            <div id="status" class="text-center text-sm font-semibold mt-3 text-soft">Desconectado</div>
        </div>

        <div id="captureArea" class="hidden flex-1 flex-col items-center justify-center space-y-4">
            <img id="preview" class="w-48 h-48 object-cover rounded-2xl">
            <button id="sendBtn" class="btn-accent w-full h-12 relative">Enviar Imagen</button>
            <button id="discardBtn" class="btn-soft w-full h-12">Descartar</button>
        </div>
        <label for="fileInput" id="captureLabel" class="capture-drop hidden h-28 flex-col items-center justify-center gap-2 font-medium">
            <svg class="ic" viewBox="0 0 24 24" style="width:30px;height:30px"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3Z"/><circle cx="12" cy="13" r="3.5"/></svg>
            Toca para capturar…
        </label>
        <input type="file" id="fileInput" accept="image/*" capture="environment" class="hidden">
    </div>

    <!-- Confirmation Overlay -->
    <div id="ack-overlay" class="pointer-events-none fixed inset-0 flex items-center justify-center bg-black bg-opacity-40 opacity-0">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-32 w-32 text-green-400 drop-shadow-lg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
    </div>

    <div id="qrScannerContainer" class="fixed inset-0 items-center justify-center hidden z-50">
        <div id="qr-reader" class="glass relative w-[90%] max-w-[500px] p-4"></div>
        <button id="closeQrScanner" class="icon-btn absolute top-6 right-6 !text-red-400 text-2xl font-bold z-50">×</button>
    </div>
    <div id="toast" class="toast-notification bg-slate-900/90 text-white py-3 px-6 rounded-full"></div>

<script>
const firebaseConfig = { apiKey: "AIzaSyAbahVsQxI_HOz_yPtDlp4hXSdZO0dvRl4", authDomain: "camara-app-lugo.firebaseapp.com", databaseURL: "https://camara-app-lugo-default-rtdb.europe-west1.firebasedatabase.app", projectId: "camara-app-lugo", storageBucket: "camara-app-lugo.appspot.com", messagingSenderId: "437448426207", appId: "1:437448426207:web:a9dbecc8cbdb77d0c4df6a" };
firebase.initializeApp(firebaseConfig);
const database = firebase.database();
const get = id => document.getElementById(id);

const channelIdInput = get('channelId'), connectBtn = get('connectBtn'), statusDiv = get('status');
const fileInput = get('fileInput'), captureArea = get('captureArea'), captureLabel = get('captureLabel');
const preview = get('preview'), sendBtn = get('sendBtn'), discardBtn = get('discardBtn');
const qrScanBtn = get('qrScanBtn'), qrScannerContainer = get('qrScannerContainer'), closeQrScanner = get('closeQrScanner');
const themeToggle = get('themeToggle'), ackOverlay = get('ack-overlay');

let currentImage = null, currentChannelRef = null, toastTimeout, ackListener = null;

const sunIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.106a.75.75 0 010 1.06l-1.591 1.59a.75.75 0 11-1.06-1.06l1.59-1.591a.75.75 0 011.06 0zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.894 17.894a.75.75 0 011.06 0l1.59 1.591a.75.75 0 11-1.06 1.06l-1.591-1.59a.75.75 0 010-1.06zM12 21a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V21.75A.75.75 0 0112 21zM5.106 17.894a.75.75 0 010-1.06l1.591-1.59a.75.75 0 111.06 1.06l-1.59 1.591a.75.75 0 01-1.06 0zM3 12a.75.75 0 01.75-.75h2.25a.75.75 0 010 1.5H3.75A.75.75 0 013 12zM6.106 6.106a.75.75 0 011.06 0l1.591 1.59a.75.75 0 111.06-1.06l-1.59-1.591a.75.75 0 010-1.06z" /></svg>`;
const moonIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path fill-rule="evenodd" d="M9.528 1.718a.75.75 0 01.162.819A8.97 8.97 0 009 6a9 9 0 009 9 8.97 8.97 0 004.472-.69a.75.75 0 01.82.162l.805.806a.75.75 0 01-.162.82a10.488 10.488 0 01-5.05 3.402A10.488 10.488 0 019.5 21a10.5 10.5 0 01-10.236-9.273A10.488 10.488 0 015.05 1.936a.75.75 0 01.82-.162l.806.805a.75.75 0 01.162.82zM10.25 11.25a.75.75 0 01.75-.75h.008a.75.75 0 01.75.75v.008a.75.75 0 01-.75.75h-.008a.75.75 0 01-.75-.75v-.008zM12.25 7.5a.75.75 0 01.75-.75h.008a.75.75 0 01.75.75v.008a.75.75 0 01-.75.75h-.008a.75.75 0 01-.75-.75V7.5z" clip-rule="evenodd" /></svg>`;
function applyTheme(theme) { document.body.classList.toggle('light', theme === 'light'); themeToggle.innerHTML = theme === 'light' ? moonIcon : sunIcon; }
themeToggle.addEventListener('click', () => { vibrate(); const newTheme = document.body.classList.contains('light') ? 'dark' : 'light'; localStorage.setItem('mobileTheme', newTheme); applyTheme(newTheme); });
function vibrate(duration = 50) { if (navigator.vibrate) navigator.vibrate(duration); }
function showToast(message) { const toast = get('toast'); toast.textContent = message; toast.classList.add('show'); clearTimeout(toastTimeout); toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 3000); }
function setButtonLoading(button, isLoading, text) { button.disabled = isLoading; if (isLoading) { button.innerHTML = `<div class="spinner mx-auto"></div>`; } else { button.innerHTML = text; } }
function setUIState(isConnected) { channelIdInput.disabled = isConnected; qrScanBtn.disabled = isConnected; connectBtn.innerHTML = isConnected ? 'Desconectar' : 'Conectar'; statusDiv.textContent = isConnected ? `Conectado a Sala ${channelIdInput.value}` : 'Desconectado'; statusDiv.style.color = isConnected ? '#198754' : '#6C757D'; captureLabel.style.display = isConnected ? 'flex' : 'none'; }
function showAck() { vibrate(100); ackOverlay.style.opacity = 1; setTimeout(() => { ackOverlay.style.opacity = 0; }, 1000); }

function optimizeAndResizeImage(file, callback) {
    const MAX_WIDTH = 1280;
    const QUALITY = 0.85;
    const reader = new FileReader();
    reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
            let width = img.width;
            let height = img.height;
            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
            const canvas = document.createElement('canvas');
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            // *** LÍNEA CORREGIDA: Forzar la conversión a JPEG ***
            const dataUrl = canvas.toDataURL('image/jpeg', QUALITY);
            callback(dataUrl);
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

function connectToChannel() {
    vibrate();
    if (currentChannelRef) { if(ackListener) currentChannelRef.child('ack').off('value', ackListener); currentChannelRef = null; setUIState(false); showToast('Desconectado'); return; }
    const channelId = channelIdInput.value;
    if (!channelId || channelId.length !== 4) { showToast("Introduce un código válido de 4 dígitos"); return; }
    setButtonLoading(connectBtn, true, 'Conectar');
    currentChannelRef = database.ref('channels/' + channelId);

    ackListener = currentChannelRef.child('ack').on('value', (snapshot) => {
        if (snapshot.exists() && snapshot.val() === true) { showAck(); currentChannelRef.child('ack').remove(); }
    });

    currentChannelRef.get().then(snapshot => {
        if (snapshot.exists()) {
            setButtonLoading(connectBtn, false, 'Desconectar'); showToast(`Conectado a la sala ${channelId}`);
            localStorage.setItem('mobileChannelId', channelId); setUIState(true);
        } else {
            const initialData = { imageData: "placeholder", textData: "", timestamp: firebase.database.ServerValue.TIMESTAMP };
            currentChannelRef.set(initialData).then(() => {
                setButtonLoading(connectBtn, false, 'Desconectar'); showToast(`Sala ${channelId} creada y conectada`);
                localStorage.setItem('mobileChannelId', channelId); setUIState(true);
            }).catch(error => { setButtonLoading(connectBtn, false, 'Conectar'); showToast("Error al crear la sala."); currentChannelRef = null; });
        }
    }).catch(error => { setButtonLoading(connectBtn, false, 'Conectar'); showToast("Error de conexión."); currentChannelRef = null; });
}

function sendImage() {
    if (!currentChannelRef || !currentImage) return;
    vibrate(); setButtonLoading(sendBtn, true, 'Enviar Imagen');
    const payload = { imageData: currentImage, textData: "", timestamp: Date.now() };
    currentChannelRef.set(payload)
        .then(() => { showToast('Imagen enviada...'); discardImage(); })
        .catch(error => showToast('Error al enviar: ' + error.message))
        .finally(() => setButtonLoading(sendBtn, false, 'Enviar Imagen'));
}
function discardImage() { currentImage = null; captureArea.style.display = 'none'; captureLabel.style.display = 'flex'; fileInput.value = ''; }

connectBtn.addEventListener('click', connectToChannel);
fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) {
        vibrate();
        optimizeAndResizeImage(file, (optimizedImageData) => {
            currentImage = optimizedImageData;
            preview.src = currentImage;
            captureLabel.style.display = 'none';
            captureArea.style.display = 'flex';
        });
    }
});
sendBtn.addEventListener('click', sendImage);
discardBtn.addEventListener('click', discardImage);

let html5QrcodeScanner;
qrScanBtn.addEventListener('click', () => {
    vibrate();
    qrScannerContainer.style.display = 'flex';
    if(get("qr-reader").innerHTML === "") { html5QrcodeScanner = new Html5Qrcode("qr-reader", { formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ] }); }
    const onScanSuccess = (decodedText) => { if (/^\d{4}$/.test(decodedText)) { closeQrScanner.click(); channelIdInput.value = decodedText; showToast(`Código ${decodedText} escaneado`); connectToChannel(); } };
    html5QrcodeScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } }, onScanSuccess)
    .catch(err => { showToast("No se pudo iniciar la cámara."); closeQrScanner.click(); });
});
closeQrScanner.addEventListener('click', () => {
    vibrate();
    if (html5QrcodeScanner && html5QrcodeScanner.getState() === 2) {
        html5QrcodeScanner.stop().catch(err => {});
    }
    qrScannerContainer.style.display = 'none';
});

document.addEventListener('DOMContentLoaded', () => {
    applyTheme(localStorage.getItem('mobileTheme') || 'dark');
    channelIdInput.value = localStorage.getItem('mobileChannelId') || '';
    setUIState(false);
});
</script>
</body>
</html>
